name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    check-rust:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libspeechd-dev
            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy, rustfmt
            - name: Rust Cache
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri
            - name: Check Backend
              run: |
                  cd src-tauri
                  cargo check
                  cargo fmt --check
                  cargo clippy -- -D warnings
