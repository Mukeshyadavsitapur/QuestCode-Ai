name: Docker Build & Push

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger from GitHub UI

# Required so GITHUB_TOKEN can push packages to GHCR
permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build & Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/questcode-ai:latest
            ghcr.io/${{ steps.owner.outputs.name }}/questcode-ai:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
