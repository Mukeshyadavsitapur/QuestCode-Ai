name: Docker Build & Push

# ─── Trigger ───────────────────────────────────────────────
# Runs automatically on every push to the main branch.
# Does NOT run on pull requests (keeps unreviewed code off Docker Hub).
on:
    push:
        branches: [main]

# ─── Jobs ──────────────────────────────────────────────────
jobs:
    docker:
        name: Build & Push to Docker Hub
        runs-on: ubuntu-latest

        steps:
            # 1. Check out the repository
            - name: Checkout code
              uses: actions/checkout@v4

            # 2. Log in to Docker Hub
            #    Requires two repository secrets:
            #      DOCKERHUB_USERNAME  – your Docker Hub username
            #      DOCKERHUB_TOKEN     – Docker Hub access token (not your password)
            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            # 3. Set up Docker Buildx (enables multi-platform & cache support)
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            # 4. Extract metadata for tags & labels
            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ secrets.DOCKERHUB_USERNAME }}/questcode-ai
                  tags: |
                      # Always push a 'latest' tag on main
                      type=raw,value=latest
                      # Also tag with the short Git commit SHA for traceability
                      type=sha,prefix=sha-,format=short

            # 5. Build and push the Docker image
            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  # Cache layers in GitHub Actions cache to speed up future builds
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
